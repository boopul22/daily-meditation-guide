  <style>
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: #080706;
      background-image:
        radial-gradient(at 0% 0%, rgba(196, 146, 69, 0.04) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(150, 93, 128, 0.03) 0px, transparent 50%),
        radial-gradient(at 50% 100%, rgba(63, 141, 98, 0.02) 0px, transparent 50%);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px;
      width: 12px;
      border-radius: 50%;
      background: #e2d9ce;
      cursor: pointer;
      margin-top: -5px;
      box-shadow: 0 0 0 4px rgba(255, 248, 240, 0.1);
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 248, 240, 0.08);
      border-radius: 2px;
    }

    input[type=range]:focus {
      outline: none;
    }

    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.08);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }
      100% {
        background-position: 200% center;
      }
    }

    @keyframes fade-enter {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scale-in {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes gentle-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-breathe {
      animation: pulse-glow 6s ease-in-out infinite;
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .animate-shimmer {
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    .mask-linear {
      mask-image: linear-gradient(to right, black 85%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }

    /* Stagger children animation */
    .stagger-children > * {
      animation: fade-enter 0.5s ease-out both;
    }
    .stagger-children > *:nth-child(1) { animation-delay: 0s; }
    .stagger-children > *:nth-child(2) { animation-delay: 0.06s; }
    .stagger-children > *:nth-child(3) { animation-delay: 0.12s; }
    .stagger-children > *:nth-child(4) { animation-delay: 0.18s; }
    .stagger-children > *:nth-child(5) { animation-delay: 0.24s; }
    .stagger-children > *:nth-child(6) { animation-delay: 0.30s; }
    .stagger-children > *:nth-child(7) { animation-delay: 0.36s; }
    .stagger-children > *:nth-child(8) { animation-delay: 0.42s; }
    .stagger-children > *:nth-child(9) { animation-delay: 0.48s; }
  </style>
